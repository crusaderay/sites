<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portable Hole</title>
  <meta name="description" content="Portable Hole saves links, notes, tags, images, and videos in a private local collection.">
  <meta http-equiv="refresh" content="4;url=https://apps.apple.com/us/app/portable-hole/id6752504688">
  <style>
    :root {
      color-scheme: light dark;
      --bg: #101418;
      --panel: #f8f4ea;
      --ink: #17202a;
      --muted: #53606c;
      --accent: #1c7c68;
      --accent-ink: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(440px, 100%);
      padding: 28px;
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.25);
    }

    .icon {
      width: 64px;
      height: 64px;
      display: grid;
      place-items: center;
      border-radius: 16px;
      background: #17202a;
      color: #f8f4ea;
      font-size: 30px;
      font-weight: 800;
      line-height: 1;
    }

    h1 {
      margin: 20px 0 10px;
      font-size: 32px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }

    a {
      color: inherit;
    }

    .button {
      display: inline-flex;
      min-height: 44px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border-radius: 8px;
      background: var(--accent);
      color: var(--accent-ink);
      font-weight: 700;
      text-decoration: none;
    }

    .meta {
      margin-top: 14px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon">P</div>
    <h1>Portable Hole</h1>
    <p>Save useful links, notes, and personal references in a private collection on your phone.</p>
    <a class="button" href="https://apps.apple.com/us/app/portable-hole/id6752504688">Download on the App Store</a>
    <p class="meta">Redirecting to the App Store shortly.</p>
  </main>
</body>
</html>
